name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default least-privilege token: read-only repo access. Both jobs only
# read source, install deps from public registries, and run tests/lint;
# none of them push commits, comment on PRs, or upload artifacts.
permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Install linting and type-checking tools
        run: pip install ruff mypy

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/osm/ --ignore-missing-imports

      - name: Run tests with coverage reporting
        # No --cov-fail-under gate yet. Reporting first; gating later
        # if/when high-risk cold paths (auth.py, dashboard.py,
        # changeset.py) get targeted coverage. Per the 2026-05-09
        # technical-report-v2 review §4.2.
        run: |
          pytest tests/ \
            --cov=src/osm \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=json:coverage.json \
            -v --tb=short

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.json
          if-no-files-found: warn

      # Verify the wheel bundles all runtime data files. Without this
      # check, missing tool.setuptools.package-data entries pass tests
      # (which run from the editable checkout) but produce a broken
      # installed package — confirmed regression 2026-05-09.
      - name: Build wheel
        run: pip install build && python -m build --wheel
      - name: Wheel includes templates and zones
        run: |
          python - <<'PY'
          import zipfile, glob, sys
          wheels = glob.glob("dist/*.whl")
          assert wheels, "no wheel built"
          with zipfile.ZipFile(wheels[0]) as z:
              names = z.namelist()
          required = [
              "osm/templates/dashboard.html",
              "osm/zones/blue-ash-montgomery.geojson",
              "osm/zones/forest-park-pleasant-run.geojson",
              "osm/zones/northgate-mt-healthy.geojson",
              "osm/zones/springdale-sharonville.geojson",
              "osm/zones/hamilton-county.geojson",
          ]
          missing = [r for r in required if r not in names]
          if missing:
              print(f"Wheel is missing required data files: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: all {len(required)} runtime data files present in wheel")
          PY

  node:
    name: Node lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm install

      - name: Lint frontend JS
        run: cd web && npx eslint@8 public/js/atlas.js public/js/atlas-extras.js --no-eslintrc --env es2020 --env browser --rule '{"no-undef":"off","no-unused-vars":"warn"}'
