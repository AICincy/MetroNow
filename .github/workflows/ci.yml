name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default least-privilege token: read-only repo access. Both jobs only
# read source, install deps from public registries, and run tests/lint;
# none of them push commits, comment on PRs, or upload artifacts.
permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Install linting and type-checking tools
        run: pip install ruff mypy

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/osm/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

  node:
    name: Node lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm install

      - name: Lint frontend JS
        run: cd web && npx eslint@8 public/js/atlas.js public/js/atlas-extras.js --no-eslintrc --env es2020 --env browser --rule '{"no-undef":"off","no-unused-vars":"warn"}'
