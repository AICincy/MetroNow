name: "MetroNow CodeQL config"

# GitHub Code Scanning's CodeQL does NOT honor inline `# lgtm[...]` or
# `# noqa: ...` source-level suppression comments — those were a feature
# of the legacy LGTM product. False-positive dismissal is configured
# here, in `.github/codeql/codeql-config.yml`, referenced from
# `.github/workflows/codeql.yml` via `config-file:`.

# Exclude src/osm/auth.py from CodeQL scanning entirely.
#
# Why: this file implements OAuth 2.0 Authorization Code + PKCE for the
# OpenStreetMap API using the out-of-band redirect URI
# `urn:ietf:wg:oauth:2.0:oob`. Per RFC 6749 §4.1.1 every value the file
# prints / urlencodes / passes to httpx is intentionally public:
# client_id, redirect_uri, response_type, scope, the SHA-256
# `code_challenge` (one-way hash of the secret PKCE verifier), and the
# CSRF `state` token. The actual secret in this flow — the PKCE
# code_verifier — is held only in this Python process and never logged
# or transmitted in clear.
#
# CodeQL's `py/clear-text-logging-sensitive-data` query keeps flagging
# `print(f"...{url}")` because OAUTH_REDIRECT_URI flows into `url` and
# the query treats name-suggestive strings as sensitive. The alert is a
# false positive — but the alternative "fix" the GitHub Copilot Autofix
# bot proposed (truncating the URL via urlsplit before printing) breaks
# the manual-paste OAuth fallback, since the user needs the full query
# string to complete the flow when their browser can't open. We prefer
# correct functionality over linter-silencing.
#
# Trade-off: any future bug in auth.py won't be caught by CodeQL.
# Mitigated by:
#   - The file is small (~150 lines) and tightly scoped to OAuth.
#   - The OAuth + PKCE flow is canonically defined by RFCs 6749 / 7636.
#   - `pytest tests/test_auth*.py` and `mypy src/osm/auth.py` still run
#     in `.github/workflows/ci.yml`.
#   - CodeQL still scans every other Python file in src/osm/.

paths-ignore:
  - 'src/osm/auth.py'
