name: "MetroNow CodeQL config"

# Inline `# lgtm[...]` source-level suppression is NOT honored by GitHub's
# CodeQL Code Scanning (that syntax was only valid in the legacy LGTM
# product). Per-query path-scoped exclusions go here instead.

query-filters:
  # CodeQL py/clear-text-logging-sensitive-data flags `print(url)` at
  # src/osm/auth.py:143 because OAUTH_REDIRECT_URI flows into `url`.
  # The redirect URI is the literal string `urn:ietf:wg:oauth:2.0:oob`
  # — the canonical out-of-band OAuth 2.0 redirect, not a credential.
  # Per RFC 6749 §4.1.1 the entire authorization URL is intentionally
  # constructed for the user agent and contains only public values:
  # client_id, redirect_uri, response_type, scope, code_challenge
  # (one-way SHA-256 hash of the secret verifier), and state (CSRF).
  # The actual secret — the PKCE code_verifier — never leaves the
  # Python process and is never written to logs.
  - exclude:
      id: py/clear-text-logging-sensitive-data
      paths:
        - "src/osm/auth.py"
